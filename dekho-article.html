<style>
:root {
  --ink:#0D0D0D; --paper:#FAFAF8; --surface:#F2F1EE; --border:#E2E0DA;
  --muted:#8A8880; --accent:#E8380D; --accent2:#1A6BFF; --lime:#CCF381;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; }
body { background:var(--paper); color:var(--ink); font-family:'Instrument Sans',sans-serif; overflow-x:hidden; }
.display { font-family:'Bebas Neue',sans-serif; letter-spacing:.02em; line-height:.95; }
.mono { font-family:'DM Mono',monospace; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ── Progress bar ── */
#progress-bar {
  position:fixed; top:0; left:0; height:3px; width:0%;
  background:var(--accent); z-index:200; transition:width .1s linear;
}

/* ── Navbar ── */
#navbar {
  position:fixed; top:0; left:0; width:100%; z-index:100;
  background:rgba(250,250,248,.94); backdrop-filter:blur(14px);
  border-bottom:1.5px solid var(--border); transition:box-shadow .3s;
}
#navbar.scrolled { box-shadow:0 2px 24px rgba(0,0,0,.06); }
.nav-inner { max-width:1280px; margin:auto; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; height:64px; gap:1rem; }

/* ── Tags ── */
.tag { display:inline-block; font-family:'DM Mono',monospace; font-size:10px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; padding:3px 10px; border-radius:3px; }
.tag-review     { background:#FFF0ED; color:var(--accent);  border:1px solid #FCCABB; }
.tag-comparison { background:#EDF3FF; color:var(--accent2); border:1px solid #BCCFFF; }
.tag-top        { background:#F0FDE8; color:#2E7D10;        border:1px solid #B6EDAA; }
.tag-guide      { background:#F5F0FF; color:#6B3FD4;        border:1px solid #CDB8FF; }

/* ── Layout ── */
.article-layout { max-width:1200px; margin:0 auto; padding:2rem 1.5rem 5rem; display:grid; grid-template-columns:1fr 280px; gap:3rem; }
@media(max-width:900px) { .article-layout { grid-template-columns:1fr; } .article-sidebar { display:none; } }

/* ── Article body ── */
.article-body { min-width:0; }
.article-body h2 { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--ink); margin:2.5rem 0 .75rem; line-height:1.1; }
.article-body h3 { font-size:1.15rem; font-weight:700; color:var(--accent); margin:2rem 0 .5rem; }
.article-body p  { font-size:16px; line-height:1.9; color:#2a2a2a; margin-bottom:1.25rem; }
.article-body ul,.article-body ol { padding-left:1.5rem; margin-bottom:1.25rem; }
.article-body li { margin-bottom:.4rem; font-size:16px; line-height:1.75; }
.article-body blockquote { border-left:3px solid var(--accent); background:#FFF0ED; padding:.85rem 1.5rem; margin:1.5rem 0; border-radius:0 10px 10px 0; }
.article-body blockquote p { color:var(--accent); font-style:italic; margin:0; }
.article-body a { color:var(--accent2); text-decoration:underline; }
.article-body hr { border:none; border-top:1.5px solid var(--border); margin:2rem 0; }
.article-body img { max-width:100%; border-radius:12px; margin:1rem 0; display:block; }
.article-body figure { margin:1.5rem 0; }
.article-body figure figcaption { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-top:.5rem; text-align:center; }
.article-body table { width:100%; border-collapse:collapse; margin:1.5rem 0; font-size:14px; }
.article-body table th { background:var(--surface); font-weight:700; text-align:left; }
.article-body table td,.article-body table th { border:1px solid var(--border); padding:10px 14px; }
.article-body code { background:var(--surface); padding:2px 6px; border-radius:4px; font-family:'DM Mono',monospace; font-size:.87em; }
.article-body pre { background:#0D0D0D; color:#e8e8e8; padding:1.5rem; border-radius:12px; margin:1.5rem 0; overflow-x:auto; }
.article-body pre code { background:none; padding:0; }

/* ── Cover image ── */
.cover-wrap { position:relative; border-radius:20px; overflow:hidden; aspect-ratio:16/7; margin-bottom:2rem; background:var(--surface); }
.cover-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.cover-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.cover-placeholder span { font-family:'Bebas Neue',sans-serif; font-size:4rem; color:var(--border); letter-spacing:.1em; }

/* ── Rating circle ── */
.rating-circle { width:80px; height:80px; position:relative; flex-shrink:0; }
.rating-circle svg { transform:rotate(-90deg); }
.rating-circle .rc-track { fill:none; stroke:var(--surface); stroke-width:6; }
.rating-circle .rc-fill  { fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset .8s ease; }
.rating-num { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:1.5rem; line-height:1; color:var(--ink); }
.rating-num span { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); }

/* ── Sidebar ── */
.article-sidebar { position:sticky; top:80px; height:fit-content; display:flex; flex-direction:column; gap:1.25rem; }
.sidebar-card { background:#fff; border:1.5px solid var(--border); border-radius:14px; padding:1.25rem; }
.sidebar-card h4 { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.18em; text-transform:uppercase; margin-bottom:.85rem; }
.toc-list { list-style:none; padding:0; display:flex; flex-direction:column; gap:.3rem; }
.toc-item { font-size:13px; color:var(--muted); padding:5px 8px; border-radius:6px; cursor:pointer; transition:all .15s; line-height:1.4; }
.toc-item:hover,.toc-item.active { background:var(--surface); color:var(--ink); }

/* ── States ── */
.state-box { text-align:center; padding:5rem 0; }
.state-box .big { font-family:'Bebas Neue',sans-serif; font-size:4rem; color:var(--border); }

/* ── Share bar ── */
.share-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:999px; border:1.5px solid var(--border); font-size:12px; font-weight:600; cursor:pointer; background:#fff; color:var(--ink); transition:all .2s; text-decoration:none; }
.share-btn:hover { border-color:var(--ink); background:var(--ink); color:#fff; }

/* ── Mobile menu ── */
#mobile-menu { position:fixed; inset:0; background:var(--paper); z-index:150; transform:translateX(100%); transition:transform .4s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem; }
#mobile-menu.open { transform:translateX(0); }

@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

    </a>
    <a href="dekho.html" style="display:flex;flex-direction:column;align-items:center;text-decoration:none;line-height:1;">

</div>

<!-- Article content (hidden until loaded) -->
<div id="article-wrap" style="display:none;margin-top:64px;">

  <!-- Hero header -->

</div>

   onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'"
   aria-label="Chat on WhatsApp">

</a>

<script>
// ── CONFIG — same URL as dekho-cms.html ─────────────────────────
var API = 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

// ── BOOT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  lucide.createIcons();

  // Nav scroll + progress bar
  var navbar = document.getElementById('navbar');
  var bar    = document.getElementById('progress-bar');
  window.addEventListener('scroll', function() {
    navbar.classList.toggle('scrolled', window.scrollY > 40);
    var h = document.documentElement;
    var pct = (window.scrollY / (h.scrollHeight - h.clientHeight)) * 100;
    bar.style.width = Math.min(pct, 100) + '%';
  });

  // Mobile menu
  window.toggleMobileMenu = function() {
    var m = document.getElementById('mobile-menu');
    m.classList.toggle('open');
    document.body.style.overflow = m.classList.contains('open') ? 'hidden' : '';
  };

  // Get article ID from URL
  var params = new URLSearchParams(window.location.search);
  var id     = params.get('id');
  var slug   = params.get('slug');

  if (!id && !slug) { showError('No article specified.'); return; }

  loadArticle(id, slug);
});

// ── LOAD ARTICLE ──────────────────────────────────────────────────
function loadArticle(id, slug) {
  var body = { action: 'getPublishedArticle' };
  if (id)   body.id   = id;
  if (slug) body.slug = slug;

  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(data) {
    if (!data.ok || !data.article) { showError(data.error || 'Article not found.'); return; }
    renderArticle(data.article);
  })
  .catch(function(err) {
    showError('Could not load this article. Please try again.');
    console.error(err);
  });
}

// ── RENDER ────────────────────────────────────────────────────────
function renderArticle(a) {
  // Update page meta
  document.title = a.title + ' — DEKHO by elv8';
  setMeta('meta-canonical', 'href', 'https://www.elv8dgtl.in/dekho-article.html?id=' + a.id);
  setMeta('og-title', null, a.title);
  setMeta('og-desc',  null, a.excerpt || '');
  setMeta('og-image', null, a.coverImage || '');
  setMeta('og-url',   null, 'https://www.elv8dgtl.in/dekho-article.html?id=' + a.id);

  var tagClass = tagCls(a.category);
  var tagLabel = tagDisplay(a.category);
  var dateStr  = fmtDate(a.publishedAt);
  var initials = (a.authorName || 'D').charAt(0).toUpperCase();
  var rating   = a.rating ? parseFloat(a.rating) : null;
  var shareUrl = encodeURIComponent(window.location.href);
  var shareTitle = encodeURIComponent(a.title);

  // ── HERO ────────────────────────────────────────────────────────
  var hero = document.getElementById('article-hero');
  hero.innerHTML =
    '<div style="margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">' +
    '<a href="dekho.html" class="mono" style="font-size:11px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;">← DEKHO</a>' +
    '<span style="color:var(--border);font-size:11px;">/</span>' +
    '<span class="tag ' + tagClass + '">' + tagLabel + '</span>' +
    '</div>' +
    '<h1 class="display" style="font-size:clamp(28px,5vw,64px);color:var(--ink);line-height:.97;margin-bottom:1.25rem;">' + esc(a.title) + '</h1>' +
    '<div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem;">' +
    '<div style="display:flex;align-items:center;gap:10px;">' +
    '<div style="width:36px;height:36px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--lime);font-family:\'Bebas Neue\',sans-serif;font-size:16px;">' + initials + '</div>' +
    '<div><div style="font-size:13px;font-weight:700;">' + esc(a.authorName||'DEKHO') + '</div>' +
    '<div class="mono" style="font-size:10px;color:var(--muted);">' + dateStr + ' · ' + (a.readTime||'5') + ' min read</div></div>' +
    '</div>' +
    (rating ? '<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface);border-radius:999px;border:1.5px solid var(--border);">' +
      '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:1.6rem;line-height:1;color:var(--accent);">' + rating.toFixed(1) + '</span>' +
      '<span class="mono" style="font-size:10px;color:var(--muted);">/ 10</span></div>' : '') +
    '<div style="display:flex;gap:.5rem;margin-left:auto;">' +
    '<a href="https://twitter.com/intent/tweet?url=' + shareUrl + '&text=' + shareTitle + '" target="_blank" class="share-btn">𝕏 Share</a>' +
    '<a href="https://wa.me/?text=' + shareTitle + '%20' + shareUrl + '" target="_blank" class="share-btn">WhatsApp</a>' +
    '</div>' +
    '</div>' +
    // Cover image
    '<div class="cover-wrap">' +
    (a.coverImage
      ? '<img src="' + esc(a.coverImage) + '" alt="' + esc(a.title) + '" onerror="this.parentElement.innerHTML=\'<div class=cover-placeholder><span>DEKHO</span></div>\'">'
      : '<div class="cover-placeholder"><span>DEKHO</span></div>') +
    '</div>';

  // ── BODY ────────────────────────────────────────────────────────
  var bodyEl = document.getElementById('article-body');
  bodyEl.innerHTML = a.content || '<p style="color:var(--muted);">No content available.</p>';

  // ── SIDEBAR ─────────────────────────────────────────────────────
  var sidebar = document.getElementById('article-sidebar');
  var headings = bodyEl.querySelectorAll('h2, h3');
  var tocHtml = '';

  if (headings.length > 0) {
    // Assign IDs to headings for scroll targeting
    headings.forEach(function(h, i) {
      var headingId = 'section-' + i;
      h.id = headingId;
      tocHtml += '<li class="toc-item" onclick="scrollTo(\'' + headingId + '\')" id="toc-' + i + '">' + esc(h.textContent) + '</li>';
    });

    tocHtml = '<div class="sidebar-card">' +
      '<h4>In this article</h4>' +
      '<ul class="toc-list">' + tocHtml + '</ul>' +
      '</div>';
  }

  // Rating card in sidebar
  var ratingCard = '';
  if (rating) {
    var deg = Math.round((rating / 10) * 360);
    var circumference = 2 * Math.PI * 32; // r=32
    var dashOffset = circumference - (rating / 10) * circumference;
    ratingCard =
      '<div class="sidebar-card" style="text-align:center;">' +
      '<h4>DEKHO Score</h4>' +
      '<div style="display:flex;justify-content:center;margin-bottom:.75rem;">' +
      '<div class="rating-circle">' +
      '<svg width="80" height="80" viewBox="0 0 80 80">' +
      '<circle class="rc-track" cx="40" cy="40" r="32"/>' +
      '<circle class="rc-fill" cx="40" cy="40" r="32" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + dashOffset + '"/>' +
      '</svg>' +
      '<div class="rating-num">' + rating.toFixed(1) + '<span>/ 10</span></div>' +
      '</div></div>' +
      '<p style="font-size:12px;color:var(--muted);">' + ratingLabel(rating) + '</p>' +
      '</div>';
  }

  // Back link
  var backCard =
    '<div class="sidebar-card">' +
    '<a href="dekho.html" style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);text-decoration:none;">' +
    '← More articles</a>' +
    '<div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap;">' +
    '<a href="https://twitter.com/intent/tweet?url=' + shareUrl + '&text=' + shareTitle + '" target="_blank" class="share-btn" style="font-size:11px;padding:5px 11px;">𝕏 Tweet</a>' +
    '<a href="https://wa.me/?text=' + shareTitle + '%20' + shareUrl + '" target="_blank" class="share-btn" style="font-size:11px;padding:5px 11px;">WhatsApp</a>' +
    '</div></div>';

  sidebar.innerHTML = ratingCard + tocHtml + backCard;

  // ── SHOW ────────────────────────────────────────────────────────
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('article-wrap').style.display  = 'block';

  // TOC active tracking on scroll
  if (headings.length > 0) {
    window.addEventListener('scroll', function() {
      var scrollY = window.scrollY + 100;
      var active = 0;
      headings.forEach(function(h, i) {
        if (h.offsetTop <= scrollY) active = i;
      });
      document.querySelectorAll('.toc-item').forEach(function(el) { el.classList.remove('active'); });
      var activeToc = document.getElementById('toc-' + active);
      if (activeToc) activeToc.classList.add('active');
    });
  }
}

// ── HELPERS ───────────────────────────────────────────────────────
function scrollTo(id) {
  var el = document.getElementById(id);
  if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
}
function tagCls(cat) {
  var m = { review:'tag-review', comparison:'tag-comparison', top:'tag-top', guide:'tag-guide' };
  return m[cat] || 'tag-review';
}
function tagDisplay(cat) {
  var m = { review:'Review', comparison:'Comparison', top:'Top List', guide:'Guide' };
  return m[cat] || (cat || 'Article');
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' }); } catch(e) { return ''; }
}
function ratingLabel(r) {
  if (r >= 9.5) return 'Outstanding';
  if (r >= 9.0) return 'Excellent';
  if (r >= 8.0) return 'Very Good';
  if (r >= 7.0) return 'Good';
  if (r >= 6.0) return 'Average';
  return 'Below Average';
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setMeta(id, attr, val) {
  var el = document.getElementById(id);
  if (!el) return;
  if (attr) el.setAttribute(attr, val);
  else { el.setAttribute('content', val); }
}
function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('state-error').style.display = 'block';
}
</script>
</body>
